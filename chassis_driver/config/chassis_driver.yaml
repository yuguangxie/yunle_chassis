# ==================== Topic configuration ====================
# ==================== 话题配置 ====================
# Topic namespace prefix. All publish/subscribe topics become:
#   <topic_prefix>/<relative_topic>
# Example: /yunle_chassis/feedback/bms_status
# 话题命名空间前缀。所有发布/订阅话题都会变为：
#   <topic_prefix>/<relative_topic>
# 示例：/yunle_chassis/feedback/bms_status
topic_prefix: /yunle_chassis

# Toggle raw and debug outputs.
# 原始 CAN 和调试输出开关。
publish_raw_can: true
publish_unknown_frames: true
enable_debug_topics: true
# Log each successfully transmitted control CAN frame as hexadecimal text.
# 将每一帧成功发送到底盘的控制 CAN 报文按十六进制文本输出到节点日志。
log_control_can_frames: false

# Default ROS publisher/subscriber queue size.
# ROS 发布者和订阅者使用的默认队列长度。
default_qos_depth: 10

# Fine-grained topic switch for publishers.
# Use ["all"] to enable all publish topics;
# otherwise list only the keys you need.
# Available publish keys:
# 发布话题的细粒度开关。
# 使用 ["all"] 表示启用全部发布话题；
# 否则只列出需要启用的话题 key。
# 可用发布 key：
#   can_rx_raw
#   can_tx_raw
#   debug_unknown_frames
#   feedback_bms_status
#   feedback_vcu_warning_level
#   feedback_wheel_speed
#   feedback_ccu_status
#   feedback_sas_angle
#   feedback_target_speed_feedback
enabled_publish_topics:
  - all

# Fine-grained topic switch for subscribers.
# Use ["all"] to enable all subscribe topics;
# otherwise list only the keys you need.
# Available subscribe keys:
# 订阅话题的细粒度开关。
# 使用 ["all"] 表示启用全部订阅话题；
# 否则只列出需要启用的话题 key。
# 可用订阅 key：
#   control_scu_control_command
#   control_scu_chassis_command
#   control_scu_torque_command
#   control_vcu_chassis_debug
enabled_subscribe_topics:
  - all

# ==================== CAN message channel routing ====================
# ==================== CAN 报文通道路由 ====================
# Route decoded feedback messages to can1/can2 source channel.
# 将解码后的反馈报文映射到 can1/can2 来源通道。
message_channel_map:
  - "BMS_Status:can2"
  - "VCU_Warning_Level:can2"
  - "VCU_Wheel_Speed_Feedback:can2"
  - "VCU_CCU_Status:can2"
  - "SAS_Angle_Feedback:can2"
  - "SCU_Target_Speed_Feedback:can2"

# Route outgoing control messages to can1/can2 target channel.
# 将待发送的控制报文映射到 can1/can2 目标通道。
control_message_channel_map:
  - "SCU_Control_Command:can2"
  - "SCU_Chassis_Command:can2"
  - "SCU_Torque_Command:can2"
  - "VCU_Debug_Enable:can2"
  - "VCU_Drive_Debug:can2"

# ==================== UDP/CAN network parameters ====================
# ==================== UDP/CAN 网络参数 ====================
# Local bind IP for both CAN sockets.
# 两个 CAN socket 共用的本地绑定 IP。
local_ip: 192.168.1.102
# Local UDP bind ports for CAN1 and CAN2.
# CAN1 和 CAN2 的本地 UDP 绑定端口。
can1_local_port: 8234
can2_local_port: 8235

# Remote CAN gateway IP for each channel.
# 每个 CAN 通道对应的远端 CAN 网关 IP。
can1_remote_ip: 192.168.1.98
can2_remote_ip: 192.168.1.99
# Remote UDP destination port.
# 远端 UDP 目标端口。
remote_port: 1234

# UDP receive buffer size (bytes).
# UDP 接收缓冲区大小，单位 byte。
udp_buffer_size: 2048
# Socket receive timeout in milliseconds.
# Socket 接收超时时间，单位 ms。
socket_timeout_ms: 200

# ==================== SCU control command wrapper ====================
# ==================== SCU 控制命令封装 ====================
# Maximum physical wheel steering angle used to convert
# /control/scu_control_command steering angles in degrees to 0x121 raw.
# The 2026 protocol gives examples: JD 24 deg, WD 27 deg, TD 25 deg.
# 车辆物理最大车轮转角，用于把 /control/scu_control_command 中
# 以度为单位的转角转换为 0x121 报文 raw 值。
# 2026 协议示例：JD 24 deg，WD 27 deg，TD 25 deg。
scu_control_max_steering_angle_deg: 27.0

# Maximum accepted positive speed magnitude for SCU_Target_Speed.
# Values outside [0, max] are logged and sent as 0.
# SCU_Target_Speed 接受的最大正速度。
# 超出 [0, max] 的值会记录 warning，并按 0 下发。
scu_control_max_target_speed_kmh: 15.0
